<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"Chatting App"</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="forms">
        <form id="logInForm">
            <h1 id="welcome">Welcome</h1>
            <label id="loginUsernameInputLabel" for="loginUsernameInput">Username</label>
            <input readonly name="username" id="loginUsernameInput" type="text" autocomplete="username">
            <label id="loginPasswordInputLabel" for="loginPasswordInput">Password</label>
            <input name="password" id="loginPasswordInput" type="password" autocomplete="current-password">
            <div id="checkboxDiv">
                <label id="stayLoggedInLabel" for="stayLoggedIn">Stay logged in on reload?</label>
                <input id="stayLoggedIn" type="checkbox">
            </div>
            <button id="loginButton" type="submit">Log in</button>
        </form>
        <form id="registrationForm">
            <h1>Registration</h1>
            <label id="registerUsernameInputLabel" for="registerUsernameInput">Username</label>
            <input name="username" id="registerUsernameInput" type="text" autocomplete="username" required>
            <label id="registerPasswordInputLabel" for="registerPasswordInput">Password</label>
            <input name="password" id="registerPasswordInput" type="password" autocomplete="new-password" required>
            <label id="registerPasswordInputConfirmLabel" for="registerPasswordInputConfirm">Confirm password</label>
            <input id="registerPasswordInputConfirm" type="password" autocomplete="new-password" required>
            <button id="registrationSignupButton" type="button">Sign up</button>
        </form>
    </div>
        <div id="contactContainer">
            <div id="contactControls">
                <button id="contactButton">Addcontact</button>
            </div>
            <div id="contactDiv">
            </div>
    </div>
    <div id="adminDiv">
        <button id="adminButton" type="button">Show database</button>
        <table id="adminTable">
            <thead id="databaseThead">
                <tr id="upperTr">
                    <th id="usernameTh" scope="col">Username</th>
                    <th id="userRoleTh" scope="col">User role</th>
                    <th id="messageTextTh" scope="col">Last message</th>
                </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
        </table>
    </div>
    <div id="backupControls">
        <input type="file" id="fileUpload" accept="application/json">
        <button type="button" id="uploadBackupButton">Upload backup</button>
        <button type="button" id="backupButton">Get backup</button>
        <button type="button" id="logout">Log out</button>
    </div>
    <div id="chatDiv">
        <div id="userMessages"></div>
        <div id="inputField">
            <textarea type="text" rows="1" id="user_input"></textarea>
            <button type="button" id="saveButton">Send</button>
        </div>
    </div>
</body>
<script type="module" src="main.js"></script>
</html>
