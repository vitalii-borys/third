<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"Chatting App"</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="backupControls">
        <button type="button" id="backupButton">Get backup</button>
        <input type="file" id="fileUpload" accept="application/json">
        <button type="button" id="uploadBackupButton">Upload backup</button>
    </div>
    <div id="chatDiv">
        <div id="userMessages"></div>
        <div id="inputField">
            <textarea type="text" rows="1" id="user_input"></textarea>
            <button type="button" id="saveButton">Send</button>
        </div>
    </div>
</body>
<script type="module" src="main.js"></script>
</html>
